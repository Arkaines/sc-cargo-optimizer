<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Optimiseur de routes cargo — Star Citizen</title>
<link rel="icon" type="image/png" href="assets/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
<script>
  (function () {
    var saved = localStorage.getItem("sc-cargo-optimizer-theme");
    var theme = saved || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
</head>
<body>
<header>
  <div class="header-brand">
    <img src="assets/logo.png" alt="Arkaine Heinlein" class="brand-logo" />
    <div>
      <h1 data-i18n="appTitle"></h1>
      <p data-i18n="appSubtitle"></p>
      <p class="hint">
        <span data-i18n="poweredByPrefix"></span>
        <a href="https://uexcorp.space/api/documentation/" target="_blank" rel="noopener">UEX Corp</a>.
      </p>
    </div>
  </div>
  <div class="header-actions">
    <button type="button" id="lang-toggle" data-i18n-aria-label="langToggleLabel"></button>
    <button type="button" id="theme-toggle" data-i18n-aria-label="themeToggleLabel"></button>
  </div>
</header>

<div class="layout">
<aside id="side-panel">
  <div class="side-block">
    <h2 data-i18n="myShipTitle"></h2>
    <label for="ship-select" data-i18n="shipUsedLabel"></label>
    <select id="ship-select">
      <option value="" data-i18n="noneOption"></option>
    </select>
    <p id="ship-capacity" class="hint" style="margin-top:0.5rem;"></p>
  </div>

  <div class="side-block">
    <button type="button" id="uex-sync-all-btn" class="btn-primary" style="width:100%;" data-i18n="syncAllBtn"></button>
    <p id="uex-status" class="hint" style="margin-top:0.5rem;"></p>
  </div>

  <div class="side-block">
    <h2 data-i18n="importMissionTitle"></h2>
    <p class="hint" data-i18n="importMissionHint"></p>
    <details id="ocr-help-details">
      <summary data-i18n="ocrHelpTitle"></summary>
      <p class="hint" data-i18n="ocrHelpText"></p>
      <img src="assets/ocr-example.png" data-i18n-alt="ocrHelpImageAlt" alt="" class="ocr-help-image" />
    </details>
    <div id="ocr-dropzone" tabindex="0">
      <span data-i18n="ocrDropzoneText"></span>
      <input type="file" id="ocr-file-input" accept="image/*" style="display:none;" />
    </div>
    <p id="ocr-status" class="hint" style="margin-top:0.5rem;"></p>
    <img id="ocr-preview" style="display:none;" data-i18n-alt="ocrPreviewAlt" alt="" />
    <div id="ocr-result"></div>
  </div>
</aside>

<main>
  <div class="tabs">
    <div class="tab-buttons">
      <button type="button" class="tab-btn active" data-tab="new-mission-tab" data-i18n="newMissionTab"></button>
      <button type="button" class="tab-btn" data-tab="missions-tab" data-i18n="missionsTab"></button>
      <button type="button" class="tab-btn" data-tab="optimize-tab" data-i18n="optimizeTab"></button>
      <button type="button" class="tab-btn" data-tab="history-tab" data-i18n="historyTab"></button>
    </div>

    <div class="tab-panel" id="new-mission-tab">
    <form id="mission-form">
      <div class="form-grid">
        <div class="full">
          <label for="mission-name" data-i18n="missionNameLabel"></label>
          <input type="text" id="mission-name" data-i18n-placeholder="missionNamePlaceholder" />
        </div>
        <div>
          <label for="mission-giver" data-i18n="missionGiverLabel"></label>
          <input type="text" id="mission-giver" list="companies-datalist" data-i18n-placeholder="missionGiverPlaceholder" autocomplete="off" />
          <datalist id="companies-datalist"></datalist>
        </div>
        <datalist id="locations-datalist"></datalist>
        <div class="full">
          <label data-i18n="cargoItemsLabel"></label>
          <div id="cargo-fields"></div>
          <button type="button" id="add-cargo-btn" class="btn-primary btn-add-field" data-i18n="addCargoBtn"></button>
          <datalist id="commodities-datalist"></datalist>
        </div>
        <div>
          <label for="mission-reward" data-i18n="rewardLabel"></label>
          <input type="number" id="mission-reward" min="0" step="any" />
        </div>
        <div class="full">
          <button type="submit" class="btn-primary" data-i18n="addMissionBtn"></button>
        </div>
      </div>
    </form>

    <form id="add-location-form" class="inline-add-location">
      <div>
        <label for="new-location-name" data-i18n="addLocationLabel"></label>
        <input type="text" id="new-location-name" data-i18n-placeholder="locationNamePlaceholder" />
      </div>
      <div>
        <label for="new-location-category" data-i18n="categoryLabel"></label>
        <select id="new-location-category">
          <option value="Ville">Ville</option>
          <option value="Station">Station</option>
          <option value="Lune">Lune</option>
          <option value="Avant-poste">Avant-poste</option>
          <option value="Personnalisé">Autre</option>
        </select>
      </div>
      <div>
        <button type="submit" class="btn-secondary" data-i18n="addLocationBtn"></button>
      </div>
    </form>
    </div>

    <div class="tab-panel" id="missions-tab" style="display:none;">
    <div class="toolbar">
      <button type="button" id="select-all-missions" class="btn-secondary" data-i18n="selectAllBtn"></button>
      <button type="button" id="deselect-all-missions" class="btn-secondary" data-i18n="deselectAllBtn"></button>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th data-i18n="colInclude"></th>
            <th data-i18n="colName"></th>
            <th data-i18n="colGiver"></th>
            <th data-i18n="colPickup"></th>
            <th data-i18n="colDropoff"></th>
            <th data-i18n="colCargo"></th>
            <th data-i18n="colReward"></th>
            <th></th>
          </tr>
        </thead>
        <tbody id="missions-tbody"></tbody>
      </table>
    </div>
    <p id="missions-summary"></p>
    <p id="too-many-missions-warning" class="hint warning-text" style="display:none;"></p>
    <p id="cargo-capacity-status" class="hint"></p>
    </div>

    <div class="tab-panel" id="optimize-tab" style="display:none;">
      <div class="optimize-row">
        <div>
          <label for="start-location" data-i18n="startLocationLabel"></label>
          <select id="start-location"></select>
        </div>
        <div>
          <button type="button" id="optimize-btn" class="btn-primary" data-i18n="optimizeBtn"></button>
        </div>
      </div>
      <div id="route-result" style="margin-top:1rem;"></div>
    </div>

    <div class="tab-panel" id="history-tab" style="display:none;">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th data-i18n="colName"></th>
            <th data-i18n="colTimes"></th>
            <th data-i18n="colGiver"></th>
            <th data-i18n="colPickup"></th>
            <th data-i18n="colDropoff"></th>
            <th data-i18n="colCargo"></th>
            <th data-i18n="colReward"></th>
            <th></th>
          </tr>
        </thead>
        <tbody id="history-tbody"></tbody>
      </table>
    </div>
    <p id="history-summary"></p>
    </div>
  </div>

  <details id="distances-details">
    <summary data-i18n="distancesTab"></summary>
    <input type="text" id="distance-filter" data-i18n-placeholder="distanceFilterPlaceholder" autocomplete="off" style="margin-bottom:0.75rem;" />
    <div id="distance-editor"></div>
  </details>
</main>
</div>

<footer>
  <button type="button" id="reset-all" data-i18n="resetAllBtn"></button>
</footer>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="js/i18n.js"></script>
<script src="data/locations.js"></script>
<script src="data/commodities.js"></script>
<script src="data/companies.js"></script>
<script src="data/ships.js"></script>
<script src="data/distances.js"></script>
<script src="js/uex.js"></script>
<script src="js/ocr.js"></script>
<script src="js/app.js"></script>
<!-- Cloudflare Web Analytics --><script type='module' src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "1fd80ce7d66149998899d10d20c4603b"}'></script><!-- End Cloudflare Web Analytics -->
</body>
</html>
