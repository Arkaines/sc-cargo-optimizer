<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Optimiseur de routes cargo — Star Citizen</title>
<link rel="icon" type="image/png" href="assets/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css?v=20260716-r29" />
<script>
  (function () {
    var saved = localStorage.getItem("sc-cargo-optimizer-theme");
    var theme = saved || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
</head>
<body>
<p class="fan-disclaimer">
  <span data-i18n="fanDisclaimer"></span>
  <a href="https://robertsspaceindustries.com" target="_blank" rel="noopener">robertsspaceindustries.com</a>
</p>
<header>
  <div class="header-brand">
    <img src="assets/logo.png" alt="Arkaine Heinlein" class="brand-logo" />
    <div class="header-text">
      <h1 data-i18n="appTitle"></h1>
      <p data-i18n="appSubtitle"></p>
      <p class="hint">
        <span data-i18n="poweredByPrefix"></span>
        <a href="https://uexcorp.space/api/documentation/" target="_blank" rel="noopener">UEX Corp</a>,
        <a href="https://api.star-citizen.wiki" target="_blank" rel="noopener">Star Citizen Wiki API</a>
        <span data-i18n="poweredByAnd"></span>
        <a href="https://fleetyards.net" target="_blank" rel="noopener">FleetYards</a>.
      </p>
    </div>
    <img src="assets/made-by-the-community.png" alt="Made by the community" class="brand-logo made-by-community-logo" />
  </div>
  <div class="header-actions">
    <button type="button" id="login-btn" data-i18n="loginBtn"></button>
    <div id="user-chip" style="display:none;">
      <img id="user-avatar" alt="" class="brand-logo" />
      <div id="user-chip-info">
        <span id="user-name"></span>
        <button type="button" id="logout-btn" class="btn-primary-sm" data-i18n="logoutBtn"></button>
        <span id="cloud-sync-status" class="hint"></span>
      </div>
    </div>
    <button type="button" id="lang-toggle" data-i18n-aria-label="langToggleLabel"></button>
    <button type="button" id="theme-toggle" data-i18n-aria-label="themeToggleLabel"></button>
  </div>
</header>

<div class="layout">
<aside id="side-panel">
  <div class="side-block">
    <h2 data-i18n="myShipTitle"></h2>
    <label for="ship-select" data-i18n="shipUsedLabel"></label>
    <select id="ship-select">
      <option value="" data-i18n="noneOption"></option>
    </select>
    <p id="ship-capacity" class="hint" style="margin-top:0.5rem;"></p>
    <label for="custom-ship-capacity" data-i18n="customCapacityLabel" style="margin-top:0.75rem;"></label>
    <input type="number" id="custom-ship-capacity" min="0" step="1" data-i18n-placeholder="customCapacityPlaceholder" />
    <p class="hint" data-i18n="customCapacityHint"></p>
  </div>

  <div class="side-block">
    <h2 data-i18n="importMissionTitle"></h2>
    <p class="hint" data-i18n="importMissionHint"></p>
    <details id="ocr-help-details">
      <summary data-i18n="ocrHelpTitle"></summary>
      <p class="hint" data-i18n="ocrHelpText"></p>
      <div class="ocr-help-image-wrap">
        <img src="assets/ocr-example.png" data-i18n-alt="ocrHelpImageAlt" alt="" class="ocr-help-image" />
        <img src="assets/made-by-the-community.png" alt="Made by the community" class="made-by-community-badge" />
      </div>
    </details>
    <div id="ocr-dropzone" tabindex="0">
      <span data-i18n="ocrDropzoneText"></span>
      <input type="file" id="ocr-file-input" accept="image/*" multiple style="display:none;" />
    </div>
    <p id="ocr-status" class="hint" style="margin-top:0.5rem;"></p>
    <img id="ocr-preview" style="display:none;" data-i18n-alt="ocrPreviewAlt" alt="" />
    <div id="ocr-result"></div>
  </div>

  <div class="side-block">
    <button type="button" id="reset-all" class="btn-danger" style="width:100%;" data-i18n="resetAllBtn"></button>
  </div>
</aside>

<main>
  <div class="tabs">
    <div class="tab-buttons">
      <button type="button" class="tab-btn active" data-tab="new-mission-tab" data-i18n="newMissionTab"></button>
      <button type="button" class="tab-btn" data-tab="missions-tab" data-i18n="missionsTab"></button>
      <button type="button" class="tab-btn" data-tab="optimize-tab" data-i18n="optimizeTab"></button>
      <button type="button" class="tab-btn" data-tab="cargo-tab" data-i18n="cargoTab"></button>
      <button type="button" class="tab-btn" data-tab="history-tab" data-i18n="historyTab"></button>
      <button type="button" class="tab-btn" data-tab="companies-tab" data-i18n="companiesTab"></button>
    </div>

    <div class="tab-panel" id="new-mission-tab">
    <form id="mission-form">
      <div class="form-grid">
        <div class="full">
          <label for="mission-name" data-i18n="missionNameLabel"></label>
          <input type="text" id="mission-name" data-i18n-placeholder="missionNamePlaceholder" />
        </div>
        <div>
          <label for="mission-giver" data-i18n="missionGiverLabel"></label>
          <input type="text" id="mission-giver" list="companies-datalist" data-i18n-placeholder="missionGiverPlaceholder" autocomplete="off" />
          <datalist id="companies-datalist"></datalist>
        </div>
        <datalist id="locations-datalist"></datalist>
        <div class="full">
          <label data-i18n="cargoItemsLabel"></label>
          <div id="cargo-fields"></div>
          <button type="button" id="add-cargo-btn" class="btn-primary btn-add-field" data-i18n="addCargoBtn"></button>
          <datalist id="commodities-datalist"></datalist>
        </div>
        <div>
          <label for="mission-reward" data-i18n="rewardLabel"></label>
          <input type="number" id="mission-reward" min="0" step="any" />
        </div>
        <div class="full">
          <button type="submit" id="mission-submit-btn" class="btn-primary" data-i18n="addMissionBtn"></button>
          <button type="button" id="cancel-edit-btn" class="btn-secondary" style="display:none;" data-i18n="cancelEditBtn"></button>
        </div>
      </div>
    </form>

    <form id="add-location-form" class="inline-add-location">
      <div>
        <label for="new-location-name" data-i18n="addLocationLabel"></label>
        <input type="text" id="new-location-name" data-i18n-placeholder="locationNamePlaceholder" />
      </div>
      <div>
        <label for="new-location-category" data-i18n="categoryLabel"></label>
        <select id="new-location-category">
          <option value="Ville">Ville</option>
          <option value="Station">Station</option>
          <option value="Lune">Lune</option>
          <option value="Avant-poste">Avant-poste</option>
          <option value="Personnalisé">Autre</option>
        </select>
      </div>
      <div>
        <button type="submit" class="btn-secondary" data-i18n="addLocationBtn"></button>
      </div>
    </form>
    </div>

    <div class="tab-panel" id="missions-tab" style="display:none;">
    <div class="toolbar">
      <button type="button" id="select-all-missions" class="btn-secondary" data-i18n="selectAllBtn"></button>
      <button type="button" id="deselect-all-missions" class="btn-secondary" data-i18n="deselectAllBtn"></button>
      <button type="button" id="complete-selected-missions" class="btn-primary" data-i18n="completeSelectedBtn"></button>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th data-i18n="colInclude"></th>
            <th data-i18n="colName"></th>
            <th data-i18n="colGiver"></th>
            <th data-i18n="colPickup"></th>
            <th data-i18n="colDropoff"></th>
            <th data-i18n="colCargo"></th>
            <th data-i18n="colReward"></th>
            <th data-i18n="colReputation"></th>
            <th></th>
          </tr>
        </thead>
        <tbody id="missions-tbody"></tbody>
      </table>
    </div>
    <p id="missions-summary"></p>
    <p id="too-many-missions-warning" class="hint warning-text" style="display:none;"></p>
    <p id="cargo-capacity-status" class="hint"></p>
    </div>

    <div class="tab-panel" id="optimize-tab" style="display:none;">
      <div class="optimize-row">
        <div>
          <label for="start-location" data-i18n="startLocationLabel"></label>
          <select id="start-location"></select>
        </div>
        <div>
          <label for="start-location-custom" data-i18n="startLocationCustomLabel"></label>
          <input
            type="text"
            id="start-location-custom"
            list="locations-datalist"
            data-i18n-placeholder="startLocationCustomPlaceholder"
            autocomplete="off"
          />
        </div>
        <div>
          <button type="button" id="optimize-btn" class="btn-primary" data-i18n="optimizeBtn"></button>
          <button type="button" id="allow-revisits-btn" class="btn-toggle-revisits" data-i18n="allowRevisitsBtn"></button>
        </div>
      </div>
      <div id="broken-elevators" class="broken-elevators-list"></div>
      <div id="route-result" style="margin-top:1rem;"></div>
    </div>

    <div class="tab-panel" id="cargo-tab" style="display:none;">
      <div class="cargo-pack-panel">
        <div class="cargo-pack-header">
          <p class="hint warning-text" data-i18n="cargoTabNotFunctional"></p>
          <button type="button" class="help-btn" data-help-for="cargo-help-popover" aria-label="Aide" aria-expanded="false">?</button>
        </div>
        <div id="cargo-help-popover" class="help-popover" role="tooltip">
          <p data-i18n="cargoTabHint"></p>
          <p data-i18n="accessFacesHint"></p>
        </div>
        <div class="cargo-pack-controls">
          <fieldset id="ship-access-faces" class="access-faces-fieldset">
            <legend data-i18n="accessFacesTitle"></legend>
            <label><input type="checkbox" id="access-face-back" /> <span data-i18n="accessFaceBack"></span></label>
            <label><input type="checkbox" id="access-face-front" /> <span data-i18n="accessFaceFront"></span></label>
            <label><input type="checkbox" id="access-face-left" /> <span data-i18n="accessFaceLeft"></span></label>
            <label><input type="checkbox" id="access-face-right" /> <span data-i18n="accessFaceRight"></span></label>
            <label><input type="checkbox" id="access-face-top" /> <span data-i18n="accessFaceTop"></span></label>
            <label><input type="checkbox" id="access-face-bottom" /> <span data-i18n="accessFaceBottom"></span></label>
          </fieldset>
          <button type="button" id="pack-cargo-btn" class="btn-primary" data-i18n="packCargoBtn"></button>
        </div>
        <p id="cargo-pack-status" class="hint" style="margin-top:0.5rem;"></p>
      </div>

      <div id="cargo-viewer-panel" class="cargo-viewer-panel" style="display:none;">
        <div id="cargo-viewer-3d"></div>
        <div class="cargo-viewer-controls">
          <button type="button" class="btn-secondary btn-view-sm" data-view="front" data-i18n="viewFrontBtn"></button>
          <button type="button" class="btn-secondary btn-view-sm" data-view="rear" data-i18n="viewRearBtn"></button>
          <button type="button" class="btn-secondary btn-view-sm" data-view="left" data-i18n="viewLeftBtn"></button>
          <button type="button" class="btn-secondary btn-view-sm" data-view="right" data-i18n="viewRightBtn"></button>
          <button type="button" class="btn-secondary btn-view-sm" data-view="top" data-i18n="viewTopBtn"></button>
          <button type="button" class="btn-secondary btn-view-sm" data-view="bottom" data-i18n="viewBottomBtn"></button>
        </div>
        <div id="cargo-step-nav" class="cargo-step-nav" style="display:none;">
          <button type="button" id="cargo-step-prev" class="btn-secondary btn-step-nav" aria-label="Précédent">‹</button>
          <div class="cargo-step-info">
            <h3 id="cargo-step-title"></h3>
            <ul id="cargo-step-actions"></ul>
          </div>
          <button type="button" id="cargo-step-next" class="btn-secondary btn-step-nav" aria-label="Suivant">›</button>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="history-tab" style="display:none;">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th data-i18n="colName"></th>
            <th data-i18n="colTimes"></th>
            <th data-i18n="colGiver"></th>
            <th data-i18n="colPickup"></th>
            <th data-i18n="colDropoff"></th>
            <th data-i18n="colCargo"></th>
            <th data-i18n="colReward"></th>
            <th data-i18n="colReputation"></th>
            <th></th>
          </tr>
        </thead>
        <tbody id="history-tbody"></tbody>
      </table>
    </div>
    <p id="history-summary"></p>
    <div id="reputation-summary"></div>
    </div>

    <div class="tab-panel" id="companies-tab" style="display:none;">
      <p class="hint" data-i18n="companiesHint"></p>
      <div id="companies-list"></div>
    </div>
  </div>

  <details id="distances-details">
    <summary data-i18n="distancesTab"></summary>
    <input type="text" id="distance-filter" data-i18n-placeholder="distanceFilterPlaceholder" autocomplete="off" style="margin-bottom:0.75rem;" />
    <div id="distance-editor"></div>
  </details>
</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/i18n.js?v=20260716-r29"></script>
<script src="data/locations.js?v=20260716-r29"></script>
<script src="data/location-aliases.js?v=20260716-r29"></script>
<script src="data/commodity-aliases.js?v=20260716-r29"></script>
<script src="data/commodities.js?v=20260716-r29"></script>
<script src="data/companies.js?v=20260716-r29"></script>
<script src="data/ships.js?v=20260716-r29"></script>
<script src="data/distances.js?v=20260716-r29"></script>
<script src="data/scwiki-locations.js?v=20260716-r29"></script>
<script src="data/location-planets.js?v=20260716-r29"></script>
<script src="data/mission-reputation.js?v=20260716-r29"></script>
<script src="data/mission-reputation-by-title.js?v=20260716-r29"></script>
<script src="data/mission-title-aliases.js?v=20260716-r29"></script>
<script src="data/faction-reputation-ladders.js?v=20260716-r29"></script>
<script src="js/uex.js?v=20260716-r29"></script>
<script src="js/scwiki.js?v=20260716-r29"></script>
<script src="js/fleetyards.js?v=20260716-r29"></script>
<script src="js/cargo-packing.js?v=20260716-r29"></script>
<script src="js/ocr.js?v=20260716-r29"></script>
<script src="js/cloud.js?v=20260716-r29"></script>
<script src="js/app.js?v=20260716-r29"></script>

{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",

</body>
</html>
