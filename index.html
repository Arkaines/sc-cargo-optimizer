<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Optimiseur de routes cargo — Star Citizen</title>
<link rel="icon" type="image/png" href="assets/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Titillium+Web:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css?v=20260720-r67" />
<script>
  (function () {
    var saved = localStorage.getItem("sc-cargo-optimizer-theme");
    var theme = saved || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
</head>
<body>
<p class="fan-disclaimer">
  <span data-i18n="fanDisclaimer"></span>
  <a href="https://robertsspaceindustries.com" target="_blank" rel="noopener">robertsspaceindustries.com</a>
</p>
<header>
  <div class="header-brand">
    <img src="assets/logo.png" alt="Arkaine Heinlein" class="brand-logo" />
    <div class="header-text">
      <h1 data-i18n="appTitle"></h1>
      <p data-i18n="appSubtitle"></p>
      <p class="hint">
        <span data-i18n="poweredByPrefix"></span>
        <a href="https://uexcorp.space/api/documentation/" target="_blank" rel="noopener">UEX Corp</a>,
        <a href="https://api.star-citizen.wiki" target="_blank" rel="noopener">Star Citizen Wiki API</a>
        <span data-i18n="poweredByAnd"></span>
        <a href="https://fleetyards.net" target="_blank" rel="noopener">FleetYards</a>.
      </p>
    </div>
    <img src="assets/made-by-the-community.png" alt="Made by the community" class="brand-logo made-by-community-logo" />
  </div>
  <div class="header-actions">
    <button type="button" id="login-btn" data-i18n="loginBtn"></button>
    <div id="user-chip" style="display:none;">
      <img id="user-avatar" alt="" class="brand-logo" />
      <div id="user-chip-info">
        <span id="user-name"></span>
        <button type="button" id="logout-btn" class="btn-primary-sm" data-i18n="logoutBtn"></button>
        <span id="cloud-sync-status" class="hint"></span>
      </div>
    </div>
    <button type="button" id="lang-toggle" data-i18n-aria-label="langToggleLabel"></button>
    <button type="button" id="theme-toggle" data-i18n-aria-label="themeToggleLabel"></button>
  </div>
</header>

<div class="layout">
<aside id="side-panel">
  <div class="side-block cut-corner">
    <h2 data-i18n="myShipTitle"></h2>
    <label for="ship-select" data-i18n="shipUsedLabel"></label>
    <select id="ship-select">
      <option value="" data-i18n="noneOption"></option>
    </select>
    <p id="ship-capacity" class="hint" style="margin-top:0.5rem;"></p>
    <label for="custom-ship-capacity" data-i18n="customCapacityLabel" style="margin-top:0.75rem;"></label>
    <input type="number" id="custom-ship-capacity" min="0" step="1" data-i18n-placeholder="customCapacityPlaceholder" />
  </div>

  <div class="side-block cut-corner">
    <h2 data-i18n="importMissionTitle"></h2>
    <!-- Volontairement STATIQUE (plus un <details> repliable) : replié, les
         joueurs ne l'ouvraient pas et rataient l'exemple, donc envoyaient des
         captures inexploitables. Toujours visible = ils voient d'emblée quoi
         capturer. -->
    <div id="ocr-help">
      <p class="ocr-help-title" data-i18n="ocrHelpTitle"></p>
      <p class="hint" data-i18n="ocrHelpText"></p>
      <div class="ocr-help-image-wrap">
        <img src="assets/ocr-example.webp" data-i18n-alt="ocrHelpImageAlt" alt="" class="ocr-help-image" />
        <img src="assets/made-by-the-community.png" alt="Made by the community" class="made-by-community-badge" />
      </div>
    </div>
    <!-- role + gestion clavier : la zone était focalisable (tabindex="0") mais
         n'écoutait que le clic, et n'avait aucun style de focus. Au clavier
         elle était donc une impasse silencieuse — on y entrait sans le voir et
         Entrée n'y faisait rien, alors que c'est la voie d'import principale. -->
    <div id="ocr-dropzone" tabindex="0" role="button" data-i18n-aria-label="ocrDropzoneAria">
      <span data-i18n="ocrDropzoneText"></span>
      <input type="file" id="ocr-file-input" accept="image/*" multiple style="display:none;" />
    </div>
    <p id="ocr-status" class="hint" style="margin-top:0.5rem;"></p>
    <img id="ocr-preview" style="display:none;" data-i18n-alt="ocrPreviewAlt" alt="" />
    <div id="ocr-result"></div>
  </div>

  <div class="side-block cut-corner">
    <button type="button" id="reset-all" class="btn-danger" style="width:100%;" data-i18n="resetAllBtn"></button>
  </div>
</aside>

<main>
  <div class="tabs cut-corner">
    <div class="tab-buttons">
      <button type="button" class="tab-btn active" data-tab="new-mission-tab" data-i18n="newMissionTab"></button>
      <button type="button" class="tab-btn" data-tab="missions-tab" data-i18n="missionsTab"></button>
      <button type="button" class="tab-btn" data-tab="optimize-tab" data-i18n="optimizeTab"></button>
      <button type="button" class="tab-btn" data-tab="cargo-tab" data-i18n="cargoTab"></button>
      <button type="button" class="tab-btn" data-tab="history-tab" data-i18n="historyTab"></button>
      <button type="button" class="tab-btn" data-tab="companies-tab" data-i18n="companiesTab"></button>
      <!-- Onglet de modération : affiché uniquement pour un admin (confort
           d'affichage — le vrai garde-fou reste la RLS, qui refuse toute
           écriture d'un non-admin même s'il forçait l'onglet). -->
      <button type="button" class="tab-btn" id="submissions-tab-btn" data-tab="submissions-tab" style="display:none;" data-i18n="submissionsTab"></button>
    </div>

    <div class="tab-panel" id="new-mission-tab">
    <form id="mission-form">
      <div class="form-grid">
        <div>
          <label for="mission-name" data-i18n="missionNameLabel"></label>
          <input type="text" id="mission-name" data-i18n-placeholder="missionNamePlaceholder" />
        </div>
        <div>
          <label for="mission-giver" data-i18n="missionGiverLabel"></label>
          <input type="text" id="mission-giver" list="companies-datalist" data-i18n-placeholder="missionGiverPlaceholder" autocomplete="off" />
          <datalist id="companies-datalist"></datalist>
        </div>
        <div>
          <label for="mission-reward" data-i18n="rewardLabel"></label>
          <input type="number" id="mission-reward" min="0" step="any" />
        </div>
        <datalist id="locations-datalist"></datalist>
        <div class="full">
          <label data-i18n="cargoItemsLabel"></label>
          <div id="cargo-fields"></div>
          <datalist id="commodities-datalist"></datalist>
        </div>
      </div>
    </form>

    <form id="add-location-form" class="inline-add-location">
      <div>
        <button type="button" id="add-cargo-btn" class="btn-primary btn-add-field" data-i18n="addCargoBtn"></button>
      </div>
      <div>
        <label for="new-location-name" data-i18n="addLocationLabel"></label>
        <input type="text" id="new-location-name" data-i18n-placeholder="locationNamePlaceholder" />
      </div>
      <div>
        <label for="new-location-category" data-i18n="categoryLabel"></label>
        <select id="new-location-category">
          <option value="Ville">Ville</option>
          <option value="Station">Station</option>
          <option value="Lune">Lune</option>
          <option value="Avant-poste">Avant-poste</option>
          <option value="Personnalisé">Autre</option>
        </select>
      </div>
      <div>
        <button type="submit" class="btn-secondary" data-i18n="addLocationBtn"></button>
      </div>
      <div>
        <button type="submit" id="mission-submit-btn" class="btn-primary" form="mission-form" data-i18n="addMissionBtn"></button>
        <button type="button" id="cancel-edit-btn" class="btn-secondary" style="display:none;" data-i18n="cancelEditBtn"></button>
      </div>
    </form>
    </div>

    <div class="tab-panel" id="missions-tab" style="display:none;">
    <div class="toolbar">
      <button type="button" id="select-all-missions" class="btn-secondary" data-i18n="selectAllBtn"></button>
      <button type="button" id="deselect-all-missions" class="btn-secondary" data-i18n="deselectAllBtn"></button>
      <button type="button" id="complete-selected-missions" class="btn-primary" data-i18n="completeSelectedBtn"></button>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th data-i18n="colInclude"></th>
            <th data-i18n="colName"></th>
            <th data-i18n="colGiver"></th>
            <th data-i18n="colPickup"></th>
            <th data-i18n="colDropoff"></th>
            <th data-i18n="colCargo"></th>
            <th data-i18n="colReward"></th>
            <th data-i18n="colReputation"></th>
            <th></th>
          </tr>
        </thead>
        <tbody id="missions-tbody"></tbody>
      </table>
    </div>
    <p id="missions-summary"></p>
    <p id="too-many-missions-warning" class="hint warning-text" style="display:none;"></p>
    <p id="cargo-capacity-status" class="hint"></p>
    </div>

    <div class="tab-panel" id="optimize-tab" style="display:none;">
      <div class="optimize-row">
        <div>
          <label for="start-location" data-i18n="startLocationLabel"></label>
          <select id="start-location"></select>
        </div>
        <div>
          <label for="start-location-custom" data-i18n="startLocationCustomLabel"></label>
          <input
            type="text"
            id="start-location-custom"
            list="locations-datalist"
            data-i18n-placeholder="startLocationCustomPlaceholder"
            autocomplete="off"
          />
        </div>
        <div>
          <button type="button" id="optimize-btn" class="btn-primary" data-i18n="optimizeBtn"></button>
          <button type="button" id="allow-revisits-btn" class="btn-toggle-revisits" data-i18n="allowRevisitsBtn"></button>
        </div>
      </div>
      <div id="broken-elevators" class="broken-elevators-list"></div>
      <div id="route-result" style="margin-top:1rem;"></div>
    </div>

    <div class="tab-panel" id="cargo-tab" style="display:none;">
      <div class="cargo-pack-panel">
        <div class="cargo-pack-controls">
          <fieldset id="ship-access-faces" class="access-faces-fieldset cut-corner">
            <legend data-i18n="accessFacesTitle"></legend>
            <label><input type="checkbox" id="access-face-back" /> <span data-i18n="accessFaceBack"></span></label>
            <label><input type="checkbox" id="access-face-front" /> <span data-i18n="accessFaceFront"></span></label>
            <label><input type="checkbox" id="access-face-left" /> <span data-i18n="accessFaceLeft"></span></label>
            <label><input type="checkbox" id="access-face-right" /> <span data-i18n="accessFaceRight"></span></label>
            <label><input type="checkbox" id="access-face-top" /> <span data-i18n="accessFaceTop"></span></label>
            <label><input type="checkbox" id="access-face-bottom" /> <span data-i18n="accessFaceBottom"></span></label>
            <!-- Accès depuis une coursive centrale : le joueur y est debout et
                 décrit ce qu'il atteint à sa gauche et à sa droite. Une soute
                 de bâbord s'ouvre alors par sa face DROITE et une soute de
                 tribord par sa face GAUCHE — ce qu'une case « gauche » ou
                 « droite » seule ne peut pas exprimer, le côté à ouvrir
                 changeant d'une soute à l'autre sur le même vaisseau. -->
            <label><input type="checkbox" id="access-face-interiorLeft" /> <span data-i18n="accessFaceInteriorLeft"></span></label>
            <label><input type="checkbox" id="access-face-interiorRight" /> <span data-i18n="accessFaceInteriorRight"></span></label>
          </fieldset>
          <button type="button" id="pack-cargo-btn" class="btn-primary" data-i18n="packCargoBtn"></button>
          <button type="button" id="admin-grid-edit-btn" class="btn-secondary" style="display:none;" data-i18n="adminGridEditBtn"></button>
        </div>
        <p class="hint warning-text" data-i18n="cargoTabNotFunctional"></p>
        <p id="cargo-pack-status" class="hint"></p>
      </div>

      <div class="cargo-viewer-row">
        <div id="cargo-viewer-panel" class="cargo-viewer-panel cut-corner" style="display:none;">
          <!-- L'éditeur admin est AVANT le rendu 3D : placé après, le canvas
               (~700 px) repoussait ses contrôles à ~1000 px, hors écran, et
               ils passaient pour absents alors qu'ils étaient seulement plus
               bas que la fenêtre. -->
          <div id="admin-grid-panel" style="display:none;">
            <p class="hint" data-i18n="adminGridHint"></p>
            <div class="admin-grid-row">
              <button type="button" id="admin-grid-add-btn" class="btn-secondary btn-view-sm" data-i18n="adminGridAddBtn"></button>
              <button type="button" id="admin-grid-remove-btn" class="btn-danger btn-view-sm" data-i18n="adminGridRemoveBtn"></button>
              <button type="button" id="admin-grid-rotate-btn" class="btn-secondary btn-view-sm" data-i18n="adminGridRotateBtn"></button>
              <button type="button" id="admin-grid-moveall-btn" class="btn-secondary btn-view-sm" data-i18n="adminGridMoveAllBtn"></button>
              <button type="button" id="admin-grid-publish-btn" class="btn-primary btn-view-sm" data-i18n="adminGridPublishBtn"></button>
              <button type="button" id="admin-grid-close-btn" class="btn-secondary btn-view-sm" data-i18n="adminGridCloseBtn"></button>
            </div>
            <div id="admin-grid-selected" style="display:none;">
              <p id="admin-grid-selected-name" class="hint"></p>
              <div class="admin-grid-row">
                <label for="admin-grid-cx" data-i18n="adminGridCellsX"></label>
                <input type="number" id="admin-grid-cx" min="1" step="1" />
                <label for="admin-grid-cy" data-i18n="adminGridCellsY"></label>
                <input type="number" id="admin-grid-cy" min="1" step="1" />
                <label for="admin-grid-cz" data-i18n="adminGridCellsZ"></label>
                <input type="number" id="admin-grid-cz" min="1" step="1" />
                <label for="admin-grid-mcs" data-i18n="adminGridMaxBox"></label>
                <select id="admin-grid-mcs"></select>
                <span id="admin-grid-capacity" class="hint"></span>
              </div>
            </div>
          </div>
          <div id="reservation-panel" style="display:none;">
            <p class="hint" data-i18n="reservationHint"></p>
            <div class="admin-grid-row">
              <label for="reservation-len" data-i18n="reservationLen"></label>
              <input type="number" id="reservation-len" min="1" step="1" value="2" />
              <label for="reservation-wid" data-i18n="reservationWid"></label>
              <input type="number" id="reservation-wid" min="1" step="1" value="2" />
              <button type="button" id="reservation-place-btn" class="btn-primary btn-view-sm" data-i18n="reservationPlaceBtn"></button>
              <button type="button" id="reservation-close-btn" class="btn-secondary btn-view-sm" data-i18n="reservationCloseBtn"></button>
            </div>
            <div id="reservation-list"></div>
          </div>
          <div id="cargo-viewer-3d"></div>
          <p id="cargo-edit-hint" class="hint" style="display:none;" data-i18n="editLayoutHint"></p>
          <p id="cargo-published-note" class="hint" style="display:none;" data-i18n="publishedGridNote"></p>
          <div class="cargo-viewer-controls">
            <!-- Les six angles de caméra sont regroupés en un seul contrôle
                 segmenté : ils ne sont qu'UNE décision (« sous quel angle je
                 regarde »), alors qu'à plat ils pesaient autant, visuellement,
                 que « Proposer cette disposition » (envoi serveur) ou
                 « Réinitialiser » (destructif). Le point de décision passe de
                 10 boutons indiscernables à 5. Les classes ne changent pas :
                 cargo-viewer.js lie sur `.btn-view-sm[data-view]`. -->
            <div class="view-switcher" role="group" data-i18n-aria-label="viewSwitcherAria">
              <button type="button" class="btn-secondary btn-view-sm" data-view="front" data-i18n="viewFrontBtn"></button>
              <button type="button" class="btn-secondary btn-view-sm" data-view="rear" data-i18n="viewRearBtn"></button>
              <button type="button" class="btn-secondary btn-view-sm" data-view="left" data-i18n="viewLeftBtn"></button>
              <button type="button" class="btn-secondary btn-view-sm" data-view="right" data-i18n="viewRightBtn"></button>
              <button type="button" class="btn-secondary btn-view-sm" data-view="top" data-i18n="viewTopBtn"></button>
              <button type="button" class="btn-secondary btn-view-sm" data-view="bottom" data-i18n="viewBottomBtn"></button>
            </div>
            <span class="cargo-controls-sep" aria-hidden="true"></span>
            <button type="button" id="cargo-viewer-rotate-btn" class="btn-secondary btn-view-sm" data-i18n="rotateOrientationBtn" data-i18n-title="rotateOrientationHint"></button>
            <button type="button" id="cargo-viewer-mirror-btn" class="btn-secondary btn-view-sm" data-i18n="mirrorOrientationBtn" data-i18n-title="mirrorOrientationHint"></button>
            <button type="button" id="cargo-viewer-edit-btn" class="btn-secondary btn-view-sm" data-i18n="editLayoutBtn" data-i18n-title="editLayoutHint"></button>
            <button type="button" id="reservation-edit-btn" class="btn-secondary btn-view-sm" data-i18n="reserveSpotBtn"></button>
            <button type="button" id="propose-layout-btn" class="btn-primary btn-view-sm" style="display:none;" data-i18n="proposeLayoutBtn"></button>
            <button type="button" id="propose-correction-btn" class="btn-secondary btn-view-sm" style="display:none;" data-i18n="proposeCorrectionBtn"></button>
            <button type="button" id="cargo-viewer-edit-done-btn" class="btn-primary btn-view-sm" style="display:none;" data-i18n="editLayoutDoneBtn"></button>
            <button type="button" id="cargo-viewer-reset-layout-btn" class="btn-danger btn-view-sm" style="display:none;" data-i18n="resetLayoutBtn"></button>
          </div>
        </div>
        <div id="cargo-step-nav" class="cargo-step-nav cut-corner" style="display:none;">
          <button type="button" id="cargo-step-prev" class="btn-secondary btn-step-nav" data-i18n-aria-label="stepPrevLabel">‹</button>
          <div class="cargo-step-info">
            <h3 id="cargo-step-title"></h3>
            <ul id="cargo-step-actions"></ul>
          </div>
          <button type="button" id="cargo-step-next" class="btn-secondary btn-step-nav" data-i18n-aria-label="stepNextLabel">›</button>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="history-tab" style="display:none;">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th data-i18n="colName"></th>
            <th data-i18n="colTimes"></th>
            <th data-i18n="colGiver"></th>
            <th data-i18n="colPickup"></th>
            <th data-i18n="colDropoff"></th>
            <th data-i18n="colCargo"></th>
            <th data-i18n="colReward"></th>
            <th data-i18n="colReputation"></th>
            <th></th>
          </tr>
        </thead>
        <tbody id="history-tbody"></tbody>
      </table>
    </div>
    <p id="history-summary"></p>
    <div id="reputation-summary"></div>
    </div>

    <div class="tab-panel" id="companies-tab" style="display:none;">
      <p class="hint" data-i18n="companiesHint"></p>
      <div id="companies-list"></div>
    </div>

    <div class="tab-panel" id="submissions-tab" style="display:none;">
      <p class="hint" data-i18n="submissionsHint"></p>
      <div class="admin-grid-row">
        <button type="button" id="submissions-refresh-btn" class="btn-secondary btn-view-sm" data-i18n="submissionsRefresh"></button>
      </div>
      <div id="submissions-list"></div>
    </div>
  </div>

</main>
</div>

<!-- SRI : le hash fige exactement le contenu attendu — une compromission du
     CDN (ou un remplacement de fichier) ferait refuser le script par le
     navigateur au lieu d'exécuter du code inconnu chez chaque joueur. Si l'une
     de ces versions doit changer un jour, recalculer le hash :
     curl -sL URL | openssl dgst -sha384 -binary | openssl base64 -A
     Limite connue : Tesseract charge son worker/WASM à l'exécution depuis le
     CDN (URLs versionnées mais non couvertes par ce hash). -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js" integrity="sha384-GJqSu7vueQ9qN0E9yLPb3Wtpd7OrgK8KmYzC8T1IysG1bcvxvIO4qtYR/D3A991F" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.7" integrity="sha384-BmlQlKlDvXvKoxkn5OQuUo/aJQCTXeB+Kls6EccBmG4Kf8AXvp89RtO9MtPxP/r5" crossorigin="anonymous"></script>

<!-- Three.js VENDU en local (vendor/three/, copie exacte de three@0.169.0) au
     lieu du CDN : supprime entièrement le risque de compromission CDN pour le
     plus gros script du site, et le visualiseur 3D survit à une panne jsdelivr.
     Pour monter de version : re-télécharger build/three.module.js et
     examples/jsm/controls/OrbitControls.js de la nouvelle version. -->
<script type="importmap">
{
  "imports": {
    "three": "./vendor/three/three.module.js?v=20260720-r67",
    "three/addons/": "./vendor/three/addons/"
  }
